name: CI DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codi
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instal·lar Firefox i Geckodriver
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Instal·lar dependències
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg2-binary selenium

      - name: Executar Tests de Seguretat
        env:
          SECRET_KEY: ${{ secrets.MY_DJANGO_SECRET }}
          MOZ_HEADLESS: 1
        run: python manage.py test core.tests_selenium
